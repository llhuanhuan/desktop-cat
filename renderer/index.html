<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Cat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="cat-container">
    <div id="cat" class="cat idle">
      <!-- 尾巴 -->
      <div class="cat-tail"></div>

      <!-- 身体 -->
      <div class="cat-body">
        <!-- 身体主体 -->
        <div class="body-main"></div>

        <!-- 后腿 -->
        <div class="leg back-left"></div>
        <div class="leg back-right"></div>

        <!-- 前腿 -->
        <div class="leg front-left"></div>
        <div class="leg front-right"></div>

        <!-- 肚子装饰 -->
        <div class="belly"></div>
      </div>

      <!-- 头部 -->
      <div class="cat-head">
        <!-- 耳朵 -->
        <div class="ear left">
          <div class="ear-inner"></div>
        </div>
        <div class="ear right">
          <div class="ear-inner"></div>
        </div>

        <!-- 脸部 -->
        <div class="face">
          <!-- 眼睛 -->
          <div class="eye left">
            <div class="pupil"></div>
            <div class="shine"></div>
          </div>
          <div class="eye right">
            <div class="pupil"></div>
            <div class="shine"></div>
          </div>

          <!-- 鼻子 -->
          <div class="nose"></div>

          <!-- 嘴巴 -->
          <div class="mouth"></div>

          <!-- 胡须 -->
          <div class="whisker left-top"></div>
          <div class="whisker left-bottom"></div>
          <div class="whisker right-top"></div>
          <div class="whisker right-bottom"></div>
        </div>
      </div>
    </div>
    <div id="notification" class="notification hidden">
      <div class="notification-text"></div>
    </div>
  </div>

  <script src="sound-generator.js"></script>
  <script src="app.js"></script>
</body>
</html>
