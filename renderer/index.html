<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Cat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="cat-container">
    <div id="cat" class="cat idle">
      <!-- 尾巴 -->
      <div class="tail"></div>

      <!-- 身体 -->
      <div class="body">
        <div class="body-main"></div>
        <div class="belly"></div>
      </div>

      <!-- 后腿 -->
      <div class="leg back-left"></div>
      <div class="leg back-right"></div>

      <!-- 前腿 -->
      <div class="leg front-left"></div>
      <div class="leg front-right"></div>

      <!-- 头部 -->
      <div class="head">
        <!-- 耳朵 -->
        <div class="ear left">
          <div class="ear-inner"></div>
        </div>
        <div class="ear right">
          <div class="ear-inner"></div>
        </div>

        <!-- 眼睛 -->
        <div class="eye left">
          <div class="eye-white">
            <div class="iris">
              <div class="pupil"></div>
              <div class="shine"></div>
            </div>
          </div>
          <div class="eyelid"></div>
        </div>
        <div class="eye right">
          <div class="eye-white">
            <div class="iris">
              <div class="pupil"></div>
              <div class="shine"></div>
            </div>
          </div>
          <div class="eyelid"></div>
        </div>

        <!-- 腮红 -->
        <div class="cheek left"></div>
        <div class="cheek right"></div>

        <!-- 鼻子嘴巴 -->
        <div class="nose-area">
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>

        <!-- 胡须 -->
        <div class="whisker left top"></div>
        <div class="whisker left mid"></div>
        <div class="whisker left bot"></div>
        <div class="whisker right top"></div>
        <div class="whisker right mid"></div>
        <div class="whisker right bot"></div>
      </div>
    </div>

    <!-- 气泡 -->
    <div id="bubble" class="bubble">
      <span class="bubble-text"></span>
    </div>
  </div>

  <script src="sound-generator.js"></script>
  <script src="app.js"></script>
</body>
</html>
