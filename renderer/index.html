<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Cat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="cat-container">
    <div id="cat" class="cat idle">
      <!-- 尾巴 -->
      <div class="tail">
        <div class="tail-curve"></div>
      </div>

      <!-- 身体 -->
      <div class="body">
        <!-- 身体主体 -->
        <div class="body-shape"></div>
        <!-- 肚子 -->
        <div class="belly"></div>
        <!-- 花纹 -->
        <div class="stripe s1"></div>
        <div class="stripe s2"></div>
        <div class="stripe s3"></div>
      </div>

      <!-- 后腿 -->
      <div class="paw back left">
        <div class="paw-pad"></div>
      </div>
      <div class="paw back right">
        <div class="paw-pad"></div>
      </div>

      <!-- 前腿 -->
      <div class="paw front left">
        <div class="paw-pad"></div>
      </div>
      <div class="paw front right">
        <div class="paw-pad"></div>
      </div>

      <!-- 头部 -->
      <div class="head">
        <!-- 耳朵 -->
        <div class="ear left">
          <div class="ear-inner"></div>
        </div>
        <div class="ear right">
          <div class="ear-inner"></div>
        </div>

        <!-- 脸部 -->
        <div class="face">
          <!-- 眼睛 -->
          <div class="eye left">
            <div class="iris">
              <div class="pupil"></div>
            </div>
            <div class="shine"></div>
            <div class="eyelid"></div>
          </div>
          <div class="eye right">
            <div class="iris">
              <div class="pupil"></div>
            </div>
            <div class="shine"></div>
            <div class="eyelid"></div>
          </div>

          <!-- 鼻子 -->
          <div class="nose"></div>

          <!-- 嘴巴 -->
          <div class="mouth">
            <div class="tongue"></div>
          </div>

          <!-- 腮红 -->
          <div class="blush left"></div>
          <div class="blush right"></div>

          <!-- 胡须 -->
          <div class="whiskers left">
            <div class="whisker w1"></div>
            <div class="whisker w2"></div>
            <div class="whisker w3"></div>
          </div>
          <div class="whiskers right">
            <div class="whisker w1"></div>
            <div class="whisker w2"></div>
            <div class="whisker w3"></div>
          </div>
        </div>
      </div>

      <!-- 项圈 -->
      <div class="collar">
        <div class="bell"></div>
      </div>
    </div>

    <!-- 气泡 -->
    <div id="bubble" class="bubble hidden">
      <div class="bubble-text"></div>
    </div>

    <!-- 通知 -->
    <div id="notification" class="notification hidden">
      <div class="notification-icon"></div>
      <div class="notification-text"></div>
    </div>
  </div>

  <script src="sound-generator.js"></script>
  <script src="app.js"></script>
</body>
</html>
