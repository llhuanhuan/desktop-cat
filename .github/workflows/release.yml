name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact: dist/*-x64.exe
          - os: windows-latest
            arch: ia32
            artifact: dist/*-ia32.exe
          - os: windows-latest
            arch: arm64
            artifact: dist/*-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VC++ Redistributable
        run: |
          curl -L -o build/vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe
          curl -L -o build/vc_redist.x86.exe https://aka.ms/vs/17/release/vc_redist.x86.exe
        shell: bash

      - name: Build
        run: npm run build:win:${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-cat-win-${{ matrix.arch }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-cat-win-x64
          path: dist

      - name: Download ia32 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-cat-win-ia32
          path: dist

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-cat-win-arm64
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
